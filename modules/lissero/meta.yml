name: lissero
description: In silico serotyping of Listeria monocytogenes
keywords:
  - listeria
  - monocytogenes
  - serotype
  - typing
tools:
  - lissero:
      description: "In silico serotyping of Listeria monocytogenes"
      homepage: "https://github.com/MDU-PHL/LisSero"
      documentation: "https://github.com/MDU-PHL/LisSero"
      tool_dev_url: "https://github.com/MDU-PHL/LisSero"
      doi: "10.1128/JCM.01159-20"
      licence: ["GPL v3"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - fasta:
      type: file
      description: Assembly in FASTA format
      pattern: "*.{fasta,fasta.gz,fa,fa.gz,fna,fna.gz}"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - tsv:
      type: file
      description: Tab-delimited lissero results
      pattern: "*.tsv"
  - logs:
      type: file
      description: Standard log files
      pattern: "*.{log,err}"
  - nf_logs:
      type: file
      description: Nextflow log files
      pattern: ".command.*"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
