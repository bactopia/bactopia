name: genotyphi_parse
description: Parse GenoTyphi results from Mykrobe JSON output
keywords:
  - salmonella
  - typhi
  - genotyping
  - parse
tools:
  - genotyphi:
      description: "Assign genotypes to Salmonella Typhi genomes based on VCF files (mapped to Typhi CT18 reference genome)"
      homepage: "https://github.com/katholt/genotyphi"
      documentation: "https://github.com/katholt/genotyphi"
      tool_dev_url: "https://github.com/katholt/genotyphi"
      doi: "10.1038/ncomms8614"
      licence: ["GPL v3"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - json:
      type: file
      description: Mykrobe JSON output file
      pattern: "*.json"

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - tsv:
      type: file
      description: Tab-delimited genotyphi results
      pattern: "*.tsv"
  - logs:
      type: file
      description: Standard log files
      pattern: "*.{log,err}"
  - nf_logs:
      type: file
      description: Nextflow log files
      pattern: ".command.*"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
