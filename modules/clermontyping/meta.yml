name: clermontyping
description: In silico PCR for typing Escherichia coli isolates
keywords:
  - escherichia coli
  - phylotyping
  - typing
tools:
  - clermontyping:
      description: |
        ClermonTyping is an easy-to-use tool to phylotype Escherichia coli strains
      homepage: https://github.com/A-BN/ClermonTyping
      documentation: https://github.com/A-BN/ClermonTyping
      tool_dev_url: https://github.com/A-BN/ClermonTyping
      doi: 10.1101/2024.01.22.576678
      licence: ["GPL v3"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - fasta:
      type: file
      description: Genome assembly in FASTA format
      pattern: "*.{fa,fna,fasta,fa.gz,fna.gz,fasta.gz}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - results:
      type: file
      description: Directory containing all ClermonTyping output files
      pattern: "results/*"
  - tsv:
      type: file
      description: ClermonTyping phylogroup results
      pattern: "*.phylogroups.txt"
  - logs:
      type: file
      description: Process logs
      pattern: "*.{log,err}"
  - nf_begin:
      type: file
      description: Nextflow begin file
      pattern: ".command.begin"
  - nf_err:
      type: file
      description: Nextflow error file
      pattern: ".command.err"
  - nf_log:
      type: file
      description: Nextflow log file
      pattern: ".command.log"
  - nf_out:
      type: file
      description: Nextflow output file
      pattern: ".command.out"
  - nf_run:
      type: file
      description: Nextflow run file
      pattern: ".command.run"
  - nf_sh:
      type: file
      description: Nextflow script file
      pattern: ".command.sh"
  - nf_trace:
      type: file
      description: Nextflow trace file
      pattern: ".command.trace"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@rpetit3"
