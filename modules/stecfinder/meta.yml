name: stecfinder
description: Find STEC gene markers in E. coli genomes
keywords:
  - STEC
  - E. coli
  - virulence
  - typing
tools:
  - stecfinder:
      description: Detects Shiga toxin-producing Escherichia coli (STEC) gene markers
      homepage: https://github.com/LanLab/STECFinder
      documentation: https://github.com/LanLab/STECFinder
      tool_dev_url: https://github.com/LanLab/STECFinder
      doi: "10.3389/fcimb.2018.00044"
      licence: ['GPL v3']

input:
  - meta:
      type: map
      description: Groovy Map containing sample information
  - fasta:
      type: file
      description: Assembly file in FASTA format
      pattern: "*.{fa,fasta,fna,fa.gz,fasta.gz,fna.gz}"
  - reads:
      type: file
      description: Reads file (if using reads mode)
      pattern: "*.{fastq,fastq.gz,fq,fq.gz}"

output:
  - tsv:
      type: file
      description: TSV file with STEC gene markers results
      pattern: "*.tsv"
  - logs:
      type: file
      description: Log files (if applicable)
      pattern: "*.{log,err}"
  - begin:
      type: file
      description: Process begin marker file
      pattern: ".command.begin"
  - err:
      type: file
      description: Process stderr log
      pattern: ".command.err"
  - log:
      type: file
      description: Process log
      pattern: ".command.log"
  - out:
      type: file
      description: Process stdout log
      pattern: ".command.out"
  - run:
      type: file
      description: Process run script
      pattern: ".command.run"
  - sh:
      type: file
      description: Process shell script
      pattern: ".command.sh"
  - trace:
      type: file
      description: Process trace log
      pattern: ".command.trace"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@rpetit3"
