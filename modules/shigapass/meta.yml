name: shigapass
description: Predict Shigella serotypes and virulence genes
keywords:
  - Shigella
  - serotype
  - virulence
  - IPABC
tools:
  - shigapass:
      description: In silico tool to predict Shigella serotypes
      homepage: https://github.com/imanyass/ShigaPass
      documentation: https://github.com/imanyass/ShigaPass
      tool_dev_url: https://github.com/imanyass/ShigaPass
      doi: "10.1093/bioinformatics/btab308"
      licence: ['GPL v3']
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - fasta:
      type: file
      description: FASTA file containing the genome assembly
      pattern: "*.{fasta,fna,fa,fasta.gz,fna.gz,fa.gz}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - tsv:
      type: file
      description: ShigaPass summary results in TSV format
      pattern: "*.tsv"
  - flex_tsv:
      type: file
      description: ShigaPass Flex summary results in TSV format
      pattern: "*_Flex_summary.tsv"
authors:
  - "@rpetit3"
