name: custom_dumpsoftwareversions
description: Custom module used to dump software versions within the nf-core pipeline template
keywords:
  - custom
  - version
tools:
  - custom:
      description: Custom module used to dump software versions within the nf-core pipeline template
      homepage: https://github.com/nf-core/tools
      documentation: https://github.com/nf-core/tools
  - multiqc:
      description: |
        Aggregate results from bioinformatics analyses across many samples into a single report
      homepage: https://multiqc.info/
      documentation: https://multiqc.info/docs/
      licence: ["GPL-3.0-or-later"]

input:
  - versions:
      type: file
      description: YML file containing software versions
      pattern: "*.yml"

output:
  - yml:
      type: file
      description: Standard YML file containing software versions
      pattern: "software_versions.yml"
  - mqc_yml:
      type: file
      description: MultiQC custom content YML file containing software versions
      pattern: "software_versions_mqc.yml"
  - logs:
      type: file
      description: Log files
      pattern: "*.{log,err}"
  - nf_begin:
      type: file
      description: Nextflow begin file
      pattern: ".command.begin"
  - nf_err:
      type: file
      description: Nextflow error file
      pattern: ".command.err"
  - nf_log:
      type: file
      description: Nextflow log file
      pattern: ".command.log"
  - nf_out:
      type: file
      description: Nextflow output file
      pattern: ".command.out"
  - nf_run:
      type: file
      description: Nextflow run file
      pattern: ".command.run"
  - nf_sh:
      type: file
      description: Nextflow script file
      pattern: ".command.sh"
  - nf_trace:
      type: file
      description: Nextflow trace file
      pattern: ".command.trace"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@drpatelh"
  - "@rpetit3"
