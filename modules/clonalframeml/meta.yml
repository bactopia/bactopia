name: clonalframeml
description: Efficient inference of recombination in bacterial genomes
keywords:
  - recombination
  - phylogeny
  - bacteria
tools:
  - clonalframeml:
      description: |
        ClonalFrameML is a software package that performs efficient inference of recombination
        in bacterial genomes
      homepage: https://github.com/xavierdidelot/ClonalFrameML
      documentation: https://github.com/xavierdidelot/ClonalFrameML/wiki
      tool_dev_url: https://github.com/xavierdidelot/ClonalFrameML
      doi: 10.1371/journal.pcbi.1004041
      licence: ["GPL v3"]
  - maskrc-svg:
      description: |
        A tool to mask recombination from ClonalFrameML output and create SVG visualizations
      homepage: https://github.com/kwongj/maskrc-svg
      documentation: https://github.com/kwongj/maskrc-svg
      licence: ["GPL v3"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - msa:
      type: file
      description: Multiple sequence alignment file
      pattern: "*.{aln,fasta,fa,aln.gz,fasta.gz,fa.gz}"
  - newick:
      type: file
      description: Phylogenetic tree in Newick format
      pattern: "*.{nwk,newick,tree}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - emsim:
      type: file
      description: Uncertainty estimation results
      pattern: "*.emsim.txt"
  - em:
      type: file
      description: EM algorithm results
      pattern: "*.em.txt"
  - status:
      type: file
      description: Importation status for each branch
      pattern: "*.importation_status.txt"
  - newick:
      type: file
      description: Tree with internal nodes labelled
      pattern: "*.labelled_tree.newick"
  - fasta:
      type: file
      description: Reconstructed sequences
      pattern: "*.ML_sequence.fasta.gz"
  - pos_ref:
      type: file
      description: Position cross reference
      pattern: "*.position_cross_reference.txt.gz"
  - masked_aln:
      type: file
      description: Alignment with recombination masked
      pattern: "*.masked.aln.gz"
  - logs:
      type: file
      description: Process logs
      pattern: "*.{log,err}"
  - nf_begin:
      type: file
      description: Nextflow begin file
      pattern: ".command.begin"
  - nf_err:
      type: file
      description: Nextflow error file
      pattern: ".command.err"
  - nf_log:
      type: file
      description: Nextflow log file
      pattern: ".command.log"
  - nf_out:
      type: file
      description: Nextflow output file
      pattern: ".command.out"
  - nf_run:
      type: file
      description: Nextflow run file
      pattern: ".command.run"
  - nf_sh:
      type: file
      description: Nextflow script file
      pattern: ".command.sh"
  - nf_trace:
      type: file
      description: Nextflow trace file
      pattern: ".command.trace"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@rpetit3"
