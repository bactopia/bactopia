name: scoary
description: Pan-genome wide association studies
keywords:
  - pangenome
  - GWAS
  - association
  - Roary
tools:
  - scoary:
      description: Microbial pan-GWAS using the output from Roary
      homepage: https://github.com/AdmiralenOla/Scoary
      documentation: https://github.com/AdmiralenOla/Scoary
      tool_dev_url: https://github.com/AdmiralenOla/Scoary
      doi: "10.1186/s13059-016-1108-8"
      licence: ['GPL v3']
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - genes:
      type: file
      description: Gene presence/absence file from Roary
      pattern: "*.csv"
  - traits:
      type: file
      description: Trait presence/absence file
      pattern: "*.csv"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - csv:
      type: file
      description: Scoary results files
      pattern: "*.csv"
authors:
  - "@rpetit3"
