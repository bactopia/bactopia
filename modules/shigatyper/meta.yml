name: shigatyper
description: Shigella serotyping from Illumina or Oxford Nanopore reads
keywords:
  - Shigella
  - serotype
  - typing
  - reads
tools:
  - shigatyper:
      description: Typing tool for Shigella spp. from Illumina or Oxford Nanopore reads
      homepage: https://github.com/CFSAN-Biostatistics/shigatyper
      documentation: https://github.com/CFSAN-Biostatistics/shigatyper
      tool_dev_url: https://github.com/CFSAN-Biostatistics/shigatyper
      doi: "10.1128/AEM.00165-19"
      licence: ['Public Domain']
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - reads:
      type: file
      description: FASTQ file(s) (single-end, paired-end, or ONT)
      pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
  - tsv:
      type: file
      description: ShigaTyper results in TSV format
      pattern: "*.tsv"
  - hits:
      type: file
      description: Detailed hits from ShigaTyper
      pattern: "*-hits.tsv"
authors:
  - "@rpetit3"
