name: sylph_profile
description: Profile metagenome samples against a database using Sylph
keywords:
  - metagenomics
  - profiling
  - taxonomy
  - abundance
tools:
  - sylph:
      description: Ultrafast ANI querying and metagenomic profiling
      homepage: https://github.com/bluenote-1577/sylph
      documentation: https://github.com/bluenote-1577/sylph/wiki
      tool_dev_url: https://github.com/bluenote-1577/sylph
      doi: "10.1038/s41587-023-02018-w"
      licence: ['MIT']

input:
  - meta:
      type: map
      description: Groovy Map containing sample information
  - reads:
      type: file
      description: FastQ files (single or paired-end)
      pattern: "*.{fastq,fastq.gz,fq,fq.gz}"
  - reference:
      type: file
      description: Sylph database file
      pattern: "*.syldb"

output:
  - tsv:
      type: file
      description: TSV file with profiling results
      pattern: "*.tsv"
  - logs:
      type: file
      description: Log files (if applicable)
      pattern: "*.{log,err}"
  - begin:
      type: file
      description: Process begin marker file
      pattern: ".command.begin"
  - err:
      type: file
      description: Process stderr log
      pattern: ".command.err"
  - log:
      type: file
      description: Process log
      pattern: ".command.log"
  - out:
      type: file
      description: Process stdout log
      pattern: ".command.out"
  - run:
      type: file
      description: Process run script
      pattern: ".command.run"
  - sh:
      type: file
      description: Process shell script
      pattern: ".command.sh"
  - trace:
      type: file
      description: Process trace log
      pattern: ".command.trace"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@rpetit3"
