name: checkm2_predict
description: Rapidly assess the quality of bacterial and archaeal genomes using machine learning
keywords:
  - quality assessment
  - completeness
  - contamination
  - bacteria
  - archaea
  - machine learning
tools:
  - checkm2:
      description: |
        CheckM2 rapidly assesses the quality of bacterial and archaeal genomes using machine learning
      homepage: https://github.com/chklovski/CheckM2
      documentation: https://github.com/chklovski/CheckM2
      tool_dev_url: https://github.com/chklovski/CheckM2
      doi: 10.1038/s41592-023-01940-w
      licence: ["GPL v3"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - fasta:
      type: file
      description: Genome assembly in FASTA format
      pattern: "*.{fa,fna,fasta,fa.gz,fna.gz,fasta.gz}"
  - db:
      type: file
      description: CheckM2 database file or directory containing the database
      pattern: "*.dmnd"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'test', single_end:false ]
  - results:
      type: file
      description: Directory containing all CheckM2 output files
      pattern: "results/*"
  - tsv:
      type: file
      description: CheckM2 quality report in tab-delimited format
      pattern: "*.tsv"
  - logs:
      type: file
      description: Process logs
      pattern: "*.{log,err}"
  - nf_begin:
      type: file
      description: Nextflow begin file
      pattern: ".command.begin"
  - nf_err:
      type: file
      description: Nextflow error file
      pattern: ".command.err"
  - nf_log:
      type: file
      description: Nextflow log file
      pattern: ".command.log"
  - nf_out:
      type: file
      description: Nextflow output file
      pattern: ".command.out"
  - nf_run:
      type: file
      description: Nextflow run file
      pattern: ".command.run"
  - nf_sh:
      type: file
      description: Nextflow script file
      pattern: ".command.sh"
  - nf_trace:
      type: file
      description: Nextflow trace file
      pattern: ".command.trace"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@rpetit3"
