#
# workflows.yaml
#
# This file is for the curation of available named workflows and Bactopia Tools available
# from Bactopia. It's main use case is with developer tools available from bactopia-py.
#
# Examples include:
#    'bactopia-download': download or build environments for running Bactopia analyses
#    'bactopia-merge-schemas': merge schemas into a single 'nextflow_schema.json'
#

# 'available_workflows' includes a list of available "named" workflows and Bactopia Tools
available_workflows:
  bactopia:
    - bactopia
    - cleanyerreads
    - staphopia
    - teton
    - updater
  bactopiatools:
    subworkflows:
      - ariba
      - bakta
      - checkm2
      - eggnog
      - gtdb
      - mashtree
      - merlin
      - pangenome
      - scrubber
      - snippy
      - staphtyper
      - tbprofiler
    modules:
      - abricate
      - abritamr
      - agrvate
      - amrfinderplus
      - blastn
      - blastp
      - blastx
      - btyper3
      - busco
      - bracken
      - checkm
      - clermontyping
      - defensefinder
      - ectyper
      - emmtyper
      - fastani
      - gamma
      - genotyphi
      - hicap
      - hpsuissero
      - ismapper
      - kleborate
      - kraken2
      - legsta
      - lissero
      - mashdist
      - mcroni
      - meningotype
      - midas
      - mlst
      - mobsuite
      - mykrobe
      - ngmaster
      - pasty
      - pbptyper
      - phispy
      - plasmidfinder
      - pneumocat
      - quast
      - rgi
      - sccmec
      - seqsero2
      - seroba
      - shigapass
      - shigatyper
      - shigeifinder
      - sistr
      - spatyper
      - ssuissero
      - staphopiasccmec
      - stecfinder
      - sylph
      - tblastn
      - tblastx
      - updater
wf_has_subdir:
  - ariba
  - blastn
  - blastp
  - blastx
  - bracken
  - busco
  - fastani
  - gamma
  - ismapper
  - kraken2
  - mashdist
  - mashtree
  - pangenome
  - snippy
  - tblastn
  - tblastx
workflows:
  #============================================================================================
  # Named Workflows
  # 
  # Below are named Workflows (e.g. bactopia, staphopia, teton) available from Bactopia
  #============================================================================================
  bactopia:
    description: "Bactopia is a flexible pipeline for complete analysis of bacterial genomes"
    includes:
      - bactopia
    is_workflow: true
    modules:
      - datasets
      - gather
      - qc
      - assembler
      - sketcher
      - amrfinderplus
      - mlst
  cleanyerreads:
    description: "Use Bactopia's read QC steps to Clean-Yer-Reads"
    includes:
      - gather
      - qc
      - scrubber
    is_workflow: true
    modules:
      - gather
      - qc
      - kraken2
  staphopia:
    description: "Staphopia is a pipeline for the analysis of Staphylococcus aureus genomes"
    includes:
      - bactopia
      - staphtyper
    is_workflow: true
  teton:
    description: "Host removal and taxon classification with estimated abundances"
    includes:
      - gather
      - scrubber
      - bracken
    is_workflow: true
    modules:
      - gather
      - kraken2
      - bracken
  updater:
    description: "Update database builds for new Bactopia version"
    includes:
      - amrfinderplus
      - mlst
    is_workflow: true
    modules:
      - amrfinderplus
      - mlst
  #============================================================================================
  # Complex Bactopia Tools
  # 
  # Below are complex Bactopia Tools consisting on a multiple modules (e.g. pangenome, snippy)
  #============================================================================================
  ariba:
    description: "Gene identification through local assemblies"
    ext: "fastq"
    modules:
      - ariba_getref
      - ariba_run
  bakta:
    description: "Rapid annotation of bacterial genomes & plasmids"
    ext: "fna"
    modules:
      - bakta_download
      - bakta_run
  checkm2:
    description: "Rapid assessment of genome bin quality using machine learning"
    ext: "fna"
    modules:
      - checkm2_download
      - checkm2_predict
  eggnog:
    description: "Functional annotation of proteins using orthologous groups and phylogenies"
    ext: "faa"
    modules:
      - eggnog_download
      - eggnog_mapper
  fastani:
    description: "Fast alignment-free computation of whole-genome Average Nucleotide Identity (ANI)"
    ext: "fna"
    path: "modules/fastani"
    modules:
      - ncbigenomedownload
    use_local: "assembly"
  gtdb:
    description: "Identify marker genes and assign taxonomic classifications"
    ext: "fna"
    modules:
      - gtdbtk_setupdb
      - gtdbtk_classifywf
  mashtree:
    description: "Create a trees using Mash distances"
    ext: "fna"
    path: "modules/mashtree"
    modules:
      - ncbigenomedownload
  merlin:
    description: "MinmER assisted species-specific bactopia tool seLectIoN"
    ext: "fna_fastq"
    modules:
      - mashdist
      - agrvate
      - clermontyping
      - ectyper
      - emmtyper
      - genotyphi
      - hicap
      - hpsuissero
      - kleborate
      - legsta
      - lissero
      - meningotype
      - ngmaster
      - pasty
      - pbptyper
      - seqsero2
      - seroba
      - shigapass
      - shigatyper
      - shigeifinder
      - sistr
      - spatyper
      - ssuissero
      - sccmec
      - stecfinder
      - tbprofiler_profile
      - tbprofiler_collate
  pangenome:
    description: "Pangenome analysis with optional core-genome phylogeny"
    ext: "gff"
    modules:
      - ncbigenomedownload
      - pirate
      - roary
      - panaroo
      - prokka
      - iqtree
      - clonalframeml
      - snpdists
      - scoary
    use_local: "gff"
  scrubber:
    description: "Scrub human reads from FASTQ files"
    ext: "fastq"
    modules:
      - kraken2
      - srahumanscrubber_scrub
  snippy:
    description: "Rapid variant calling from Illumina sequence reads with optional core-SNP phylogeny"
    ext: "illumina_fastq"
    modules:
      - ncbigenomedownload
      - snippy_run
      - snippy_core
      - gubbins
      - iqtree
      - snpdists
  staphtyper:
    description: "Includes AgrVATE, SpaTyper and sccmec for Staphylococcus aureus"
    ext: "fna"
    modules:
      - agrvate
      - spatyper
      - sccmec
  tbprofiler:
    description: "Detect resistance and lineages of Mycobacterium tuberculosis genomes"
    ext: "fastq"
    modules:
      - tbprofiler_profile
      - tbprofiler_collate
  #============================================================================================
  # Simple Bactopia Tools
  # 
  # Below are Bactopia Tools consisting on a single module or tool
  #============================================================================================
  assembler:
    path: "modules/assembler"
  datasets:
    path: "modules/datasets"
  gather:
    path: "modules/gather"
  sketcher:
    path: "modules/sketcher"
  qc:
    path: "modules/qc"
  abricate:
    description: "Mass screening of contigs for antimicrobial and virulence genes"
    ext: "fna"
    path: "modules/abricate/run"
  abritamr:
    description: "A NATA accredited tool for reporting the presence of antimicrobial resistance genes"
    ext: "fna"
    path: "modules/abritamr/run"
  agrvate:
    description: "Rapid identification of Staphylococcus aureus agr locus type and agr operon variants"
    ext: "fna"
    path: "modules/agrvate"
  amrfinderplus:
    description: "Identify antimicrobial resistance in genes or proteins"
    ext: "fna_faa_gff"
    path: "modules/amrfinderplus/run"
  ariba_getref:
    path: "modules/ariba/getref"
  ariba_run:
    path: "modules/ariba/run"
  bakta_download:
    path: "modules/bakta/download"
  bakta_run:
    path: "modules/bakta/run"
  blastn:
    description: "Search against nucleotide BLAST databases using nucleotide queries"
    ext: "blastdb"
    path: "modules/blast/blastn"
  blastp:
    description: "Search against protein BLAST databases using protein queries"
    ext: "blastdb"
    path: "modules/blast/blastp"
  blastx:
    description: "Search against protein BLAST databases using translated nucleotide queries"
    ext: "blastdb"
    path: "modules/blast/blastx"
  bracken:
    description: "Taxonomic classification and species abundance estimation of sequence reads"
    ext: "fastq"
    path: "modules/bracken"
  btyper3:
    description: "Taxonomic classification of Bacillus cereus group isolates"
    ext: "fna"
    path: "modules/btyper3"
  busco:
    description: "Assembly completeness based on evolutionarily informed expectations"
    ext: "fna"
    path: "modules/busco"
  checkm:
    description: "Assess the assembly quality of your microbial samples"
    ext: "fna"
