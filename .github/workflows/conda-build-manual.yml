name: Conda Personal Build (Manual)
on: workflow_dispatch
jobs:
  conda-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout bactopia/bactopia
        uses: actions/checkout@v6
        with:
          ref: dev

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: anaconda-client-env
          conda-remove-defaults: "true"
          channels: conda-forge,bioconda

      - name: Build and Push 
        run: |
          # Start build
          conda install -c conda-forge -c bioconda anaconda-client conda-build conda-verify
          cd data/conda/ && conda build -c conda-forge -c bioconda --output-folder . . 
          anaconda upload --force ./noarch/*.conda
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
